<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Engineering Tools{% endblock %}</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='site.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <header class="site-header">
        <div class="site-shell-header">
            <div class="header-left">
                <a class="brand" href="{{ url_for('home') }}">
                    <i class="fas fa-calculator"></i>
                    <span>Engineering Tools</span>
                </a>
            </div>
            <nav class="nav-menu" id="navMenu">
                <a href="{{ url_for('home') }}" class="nav-link active">Tools</a>
            </nav>
            <button class="menu-toggle" id="menuToggle">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </header>

    <main class="site-shell">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="site-shell">
            <p>&copy; 2024 Engineering Tools • Practical calculators for design and manufacturing</p>
        </div>
    </footer>

    <script>
        // Mobile menu toggle
        const menuToggle = document.getElementById('menuToggle');
        const navMenu = document.getElementById('navMenu');
        
        if (menuToggle) {
            menuToggle.addEventListener('click', () => {
                navMenu.classList.toggle('active');
                menuToggle.classList.toggle('active');
            });
            
            document.querySelectorAll('.nav-link').forEach(link => {
                link.addEventListener('click', () => {
                    navMenu.classList.remove('active');
                    menuToggle.classList.remove('active');
                });
            });
        }
    </script>
</body>
</html>
